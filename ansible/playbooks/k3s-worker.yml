---
# k3s-worker.yml — Join node1, node2 vào cluster làm worker (k3s agent)
#
# Play 1: đọc node-token từ master
# Play 2: cài k3s agent trên các worker, trỏ về master qua mgmt network

- name: Lấy node-token từ master
  hosts: master
  become: true
  tasks:
    - name: Đọc node-token
      ansible.builtin.slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_b64

    - name: Lưu token thành fact để worker dùng
      ansible.builtin.set_fact:
        k3s_node_token: "{{ k3s_token_b64.content | b64decode | trim }}"

- name: Cài k3s agent trên worker
  hosts: workers
  become: true
  vars:
    k3s_version: "v1.30.5+k3s1"
    master_ip: 10.10.10.10
    mgmt_iface: eth1
  tasks:
    - name: Kiểm tra k3s-agent đã cài chưa
      ansible.builtin.stat:
        path: /usr/local/bin/k3s
      register: k3s_bin

    - name: Tải script cài đặt k3s
      ansible.builtin.get_url:
        url: https://get.k3s.io
        dest: /tmp/k3s-install.sh
        mode: "0755"
      when: not k3s_bin.stat.exists

    - name: Cài đặt k3s agent và join cluster (idempotent)
      ansible.builtin.shell: |
        INSTALL_K3S_VERSION={{ k3s_version }} \
        K3S_URL=https://{{ master_ip }}:6443 \
        K3S_TOKEN={{ hostvars['node0']['k3s_node_token'] }} \
        INSTALL_K3S_EXEC="agent \
          --node-ip {{ mgmt_ip }} \
          --flannel-iface {{ mgmt_iface }}" \
        sh /tmp/k3s-install.sh
      args:
        creates: /usr/local/bin/k3s-agent

    - name: Đảm bảo service k3s-agent đang chạy
      ansible.builtin.systemd:
        name: k3s-agent
        state: started
        enabled: true
