# inventory.ini — 3 node, định danh qua mgmt network (eth1)
# node0 chạy ansible local (không SSH vào chính nó)

[master]
node0 ansible_connection=local mgmt_ip=10.10.10.10

[workers]
node1 ansible_host=10.10.10.11 mgmt_ip=10.10.10.11
node2 ansible_host=10.10.10.12 mgmt_ip=10.10.10.12

[all:vars]
ansible_user=vagrant
ansible_ssh_private_key_file=/home/vagrant/.ssh/id_rsa
ansible_ssh_common_args=-o StrictHostKeyChecking=no
