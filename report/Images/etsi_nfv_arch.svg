<svg viewBox="0 0 1140 650" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      .ink  { fill:#243B53; }
      .vnft { fill:#1E3A5F; }
      .nfit { fill:#2C4A33; }
      .hwt  { fill:#44443F; }
      .mant { fill:#6E4A1E; }
      .rp   { fill:#56657A; }
    </style>
  </defs>
  <rect x="0" y="0" width="1140" height="650" fill="#FFFFFF"/>

  <text x="445" y="34" text-anchor="middle" class="ink" font-size="20" font-weight="700">ETSI NFV Reference Architectural Framework</text>
  <text x="445" y="54" text-anchor="middle" class="rp" font-size="12">ETSI GS NFV 002 — functional blocks &amp; reference points</text>

  <!-- Service/VNF/Infra description -->
  <rect x="513" y="62" width="287" height="52" rx="5" fill="#FFFFFF" stroke="#B9C5D0" stroke-width="1.3"/>
  <text x="656" y="84" text-anchor="middle" class="ink" font-size="11.5" font-weight="600">Service, VNF &amp; Infrastructure</text>
  <text x="656" y="100" text-anchor="middle" class="ink" font-size="11.5" font-weight="600">Description</text>

  <!-- OSS / BSS -->
  <rect x="40" y="102" width="300" height="58" rx="5" fill="#EEF3F8" stroke="#4F7CAC" stroke-width="1.4"/>
  <text x="190" y="136" text-anchor="middle" class="vnft" font-size="16" font-weight="700">OSS / BSS</text>

  <!-- VNF / EMS domain group -->
  <rect x="40" y="168" width="760" height="180" rx="8" fill="#F7FAFC" stroke="#4F7CAC" stroke-width="1.2" stroke-dasharray="6 4"/>
  <text x="58" y="186" class="vnft" font-size="11" font-weight="600">VNF / EMS layer</text>

  <rect x="64"  y="194" width="216" height="52" rx="4" fill="#F4F8FB" stroke="#4F7CAC" stroke-width="1.2"/>
  <rect x="300" y="194" width="216" height="52" rx="4" fill="#F4F8FB" stroke="#4F7CAC" stroke-width="1.2"/>
  <rect x="536" y="194" width="216" height="52" rx="4" fill="#F4F8FB" stroke="#4F7CAC" stroke-width="1.2"/>
  <text x="172" y="225" text-anchor="middle" class="vnft" font-size="14" font-weight="500">EMS 1</text>
  <text x="408" y="225" text-anchor="middle" class="vnft" font-size="14" font-weight="500">EMS 2</text>
  <text x="644" y="225" text-anchor="middle" class="vnft" font-size="14" font-weight="500">EMS 3</text>

  <rect x="64"  y="268" width="216" height="58" rx="4" fill="#EEF3F8" stroke="#4F7CAC" stroke-width="1.4"/>
  <rect x="300" y="268" width="216" height="58" rx="4" fill="#EEF3F8" stroke="#4F7CAC" stroke-width="1.4"/>
  <rect x="536" y="268" width="216" height="58" rx="4" fill="#EEF3F8" stroke="#4F7CAC" stroke-width="1.4"/>
  <text x="172" y="303" text-anchor="middle" class="vnft" font-size="15" font-weight="700">VNF 1</text>
  <text x="408" y="303" text-anchor="middle" class="vnft" font-size="15" font-weight="700">VNF 2</text>
  <text x="644" y="303" text-anchor="middle" class="vnft" font-size="15" font-weight="700">VNF 3</text>

  <!-- NFVI -->
  <rect x="40" y="364" width="760" height="212" rx="8" fill="#F6FAF2" stroke="#5E8C6A" stroke-width="1.4" stroke-dasharray="6 4"/>
  <text x="56" y="386" class="nfit" font-size="13" font-weight="700">NFV Infrastructure (NFVI)</text>

  <rect x="64"  y="398" width="216" height="46" rx="4" fill="#ECF3E6" stroke="#5E8C6A" stroke-width="1.2"/>
  <rect x="300" y="398" width="216" height="46" rx="4" fill="#ECF3E6" stroke="#5E8C6A" stroke-width="1.2"/>
  <rect x="536" y="398" width="216" height="46" rx="4" fill="#ECF3E6" stroke="#5E8C6A" stroke-width="1.2"/>
  <text x="172" y="426" text-anchor="middle" class="nfit" font-size="12.5">Virtual computing</text>
  <text x="408" y="426" text-anchor="middle" class="nfit" font-size="12.5">Virtual storage</text>
  <text x="644" y="426" text-anchor="middle" class="nfit" font-size="12.5">Virtual network</text>

  <rect x="64" y="456" width="688" height="36" rx="4" fill="#DCE9D2" stroke="#5E8C6A" stroke-width="1.2"/>
  <text x="408" y="479" text-anchor="middle" class="nfit" font-size="13.5" font-weight="500">Virtualisation layer</text>

  <rect x="64"  y="504" width="216" height="46" rx="4" fill="#F1EFE8" stroke="#8A8A7E" stroke-width="1.2"/>
  <rect x="300" y="504" width="216" height="46" rx="4" fill="#F1EFE8" stroke="#8A8A7E" stroke-width="1.2"/>
  <rect x="536" y="504" width="216" height="46" rx="4" fill="#F1EFE8" stroke="#8A8A7E" stroke-width="1.2"/>
  <text x="172" y="532" text-anchor="middle" class="hwt" font-size="12.5">Computing hardware</text>
  <text x="408" y="532" text-anchor="middle" class="hwt" font-size="12.5">Storage hardware</text>
  <text x="644" y="532" text-anchor="middle" class="hwt" font-size="12.5">Network hardware</text>

  <!-- MANO -->
  <rect x="850" y="60" width="272" height="516" rx="8" fill="#FFFDF9" stroke="#C0873E" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="864" y="82" class="mant" font-size="12.5" font-weight="600">NFV Management &amp;</text>
  <text x="864" y="99" class="mant" font-size="12.5" font-weight="600">Orchestration (MANO)</text>

  <rect x="872" y="148" width="228" height="74" rx="5" fill="#FAF1E6" stroke="#C0873E" stroke-width="1.4"/>
  <text x="986" y="180" text-anchor="middle" class="mant" font-size="13.5" font-weight="700">NFV Orchestrator</text>
  <text x="986" y="200" text-anchor="middle" class="mant" font-size="12.5">(NFVO)</text>

  <rect x="872" y="298" width="228" height="74" rx="5" fill="#FAF1E6" stroke="#C0873E" stroke-width="1.4"/>
  <text x="986" y="330" text-anchor="middle" class="mant" font-size="13.5" font-weight="700">VNF Manager(s)</text>
  <text x="986" y="350" text-anchor="middle" class="mant" font-size="12.5">(VNFM)</text>

  <rect x="872" y="466" width="228" height="84" rx="5" fill="#FAF1E6" stroke="#C0873E" stroke-width="1.4"/>
  <text x="986" y="500" text-anchor="middle" class="mant" font-size="12.5" font-weight="700">Virtualised Infrastructure</text>
  <text x="986" y="520" text-anchor="middle" class="mant" font-size="12.5" font-weight="700">Manager (VIM)</text>

  <!-- ===== Reference points ===== -->
  <!-- Vn-Nf (execution, bold) -->
  <g stroke="#243B53" stroke-width="3" fill="none">
    <line x1="172" y1="326" x2="172" y2="364"/>
    <line x1="408" y1="326" x2="408" y2="364"/>
    <line x1="644" y1="326" x2="644" y2="364"/>
  </g>
  <rect x="640" y="338" width="52" height="16" fill="#FFFFFF"/>
  <text x="644" y="350" class="ink" font-size="11" font-weight="600">Vn-Nf</text>

  <!-- main reference points (solid) -->
  <g stroke="#56657A" stroke-width="1.8" fill="none">
    <polyline points="340,131 845,131 845,185 872,185"/>
    <polyline points="800,297 838,297 838,335 872,335"/>
    <polyline points="800,481 838,481 838,508 872,508"/>
    <line x1="986" y1="222" x2="986" y2="298"/>
    <line x1="986" y1="372" x2="986" y2="466"/>
    <polyline points="1100,185 1116,185 1116,508 1100,508"/>
  </g>
  <!-- other reference point (dashed) -->
  <polyline points="800,88 862,88 862,148" stroke="#8A97A6" stroke-width="1.6" fill="none" stroke-dasharray="5 4"/>

  <!-- reference point labels -->
  <rect x="516" y="123" width="92" height="16" fill="#FFFFFF"/>
  <text x="520" y="135" class="rp" font-size="11">Os-Ma-nfvo</text>
  <rect x="806" y="72" width="48" height="15" fill="#FFFFFF"/>
  <text x="810" y="84" class="rp" font-size="11">Se-Ma</text>
  <rect x="804" y="282" width="62" height="16" fill="#FFFFFF"/>
  <text x="808" y="294" class="rp" font-size="11">Ve-Vnfm</text>
  <rect x="804" y="466" width="44" height="16" fill="#FFFFFF"/>
  <text x="808" y="478" class="rp" font-size="11">Nf-Vi</text>
  <rect x="956" y="252" width="60" height="16" fill="#FFFFFF"/>
  <text x="986" y="264" text-anchor="middle" class="rp" font-size="11">Or-Vnfm</text>
  <rect x="958" y="411" width="56" height="16" fill="#FFFFFF"/>
  <text x="986" y="423" text-anchor="middle" class="rp" font-size="11">Vi-Vnfm</text>
  <g transform="translate(1127,340) rotate(90)"><text x="0" y="0" text-anchor="middle" class="rp" font-size="11">Or-Vi</text></g>

  <!-- legend -->
  <line x1="60" y1="610" x2="98" y2="610" stroke="#56657A" stroke-width="1.8"/>
  <text x="106" y="614" class="rp" font-size="12">Main reference points</text>
  <line x1="300" y1="610" x2="338" y2="610" stroke="#243B53" stroke-width="3"/>
  <text x="346" y="614" class="rp" font-size="12">Execution reference point (Vn-Nf)</text>
  <line x1="640" y1="610" x2="678" y2="610" stroke="#8A97A6" stroke-width="1.6" stroke-dasharray="5 4"/>
  <text x="686" y="614" class="rp" font-size="12">Other reference points</text>
</svg>
