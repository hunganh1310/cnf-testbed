<svg viewBox="0 0 1040 660" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI','Helvetica Neue',Arial,sans-serif">
  <defs>
    <style>
      .ink  { fill:#243B53; }
      .sub  { fill:#627D98; }
      .mono { font-family:'DejaVu Sans Mono','Courier New',monospace; }
      .rail { stroke-linecap:round; }
    </style>
  </defs>

  <rect x="0" y="0" width="1040" height="660" fill="#FFFFFF"/>

  <text x="520" y="40" text-anchor="middle" class="ink" font-size="23" font-weight="700">Mini NFVI Testbed — Cluster Topology</text>
  <text x="520" y="64" text-anchor="middle" class="sub" font-size="13">k3s · VirtualBox · 3 nodes / 2 NICs · 3 network planes</text>

  <rect x="40" y="86" width="960" height="262" rx="12" fill="#FBFCFD" stroke="#B9C5D0" stroke-width="1.4" stroke-dasharray="5 4"/>
  <text x="60" y="110" class="sub" font-size="12.5" font-weight="600">Host — Windows 11  ·  16 GB RAM  ·  Hypervisor: VirtualBox</text>

  <g>
    <rect x="72" y="124" width="270" height="200" rx="10" fill="#FFFFFF" stroke="#D2DCE6" stroke-width="1.4"/>
    <rect x="72" y="124" width="270" height="7" rx="3" fill="#4F7CAC"/>
    <text x="88" y="160" class="ink" font-size="19" font-weight="700">node0</text>
    <text x="88" y="180" class="sub" font-size="11.5">control-plane  ·  VIM</text>
    <line x1="88" y1="190" x2="326" y2="190" stroke="#EDF1F5" stroke-width="1.2"/>
    <text x="88" y="212" class="ink mono" font-size="14" font-weight="600">10.10.10.10</text>
    <text x="88" y="231" class="sub" font-size="11.5">2 vCPU · 4 GB RAM</text>
    <text x="88" y="250" class="ink" font-size="11">k3s server · kubectl · Helm</text>
    <rect x="86" y="268" width="118" height="30" rx="6" fill="#EEF3F8" stroke="#CBDDEA" stroke-width="1.1"/>
    <circle cx="100" cy="283" r="4.2" fill="#4F7CAC"/>
    <text x="111" y="287" class="ink" font-size="10.5" font-weight="600">eth1 → MGMT</text>
    <rect x="210" y="268" width="118" height="30" rx="6" fill="#FAF1E6" stroke="#EAD6BC" stroke-width="1.1"/>
    <circle cx="224" cy="283" r="4.2" fill="#C0873E"/>
    <text x="235" y="287" class="ink" font-size="10.5" font-weight="600">eth2 → DATA</text>
  </g>

  <g>
    <rect x="385" y="124" width="270" height="200" rx="10" fill="#FFFFFF" stroke="#D2DCE6" stroke-width="1.4"/>
    <rect x="385" y="124" width="270" height="7" rx="3" fill="#8295A8"/>
    <text x="401" y="160" class="ink" font-size="19" font-weight="700">node1</text>
    <text x="401" y="180" class="sub" font-size="11.5">worker  ·  NFVI / CNF</text>
    <line x1="401" y1="190" x2="639" y2="190" stroke="#EDF1F5" stroke-width="1.2"/>
    <text x="401" y="212" class="ink mono" font-size="14" font-weight="600">10.10.10.11</text>
    <text x="401" y="231" class="sub" font-size="11.5">2 vCPU · 4 GB RAM</text>
    <text x="401" y="250" class="ink" font-size="11">k3s agent · CNF pod</text>
    <rect x="399" y="268" width="118" height="30" rx="6" fill="#EEF3F8" stroke="#CBDDEA" stroke-width="1.1"/>
    <circle cx="413" cy="283" r="4.2" fill="#4F7CAC"/>
    <text x="424" y="287" class="ink" font-size="10.5" font-weight="600">eth1 → MGMT</text>
    <rect x="523" y="268" width="118" height="30" rx="6" fill="#FAF1E6" stroke="#EAD6BC" stroke-width="1.1"/>
    <circle cx="537" cy="283" r="4.2" fill="#C0873E"/>
    <text x="548" y="287" class="ink" font-size="10.5" font-weight="600">eth2 → DATA</text>
  </g>

  <g>
    <rect x="698" y="124" width="270" height="200" rx="10" fill="#FFFFFF" stroke="#D2DCE6" stroke-width="1.4"/>
    <rect x="698" y="124" width="270" height="7" rx="3" fill="#8295A8"/>
    <text x="714" y="160" class="ink" font-size="19" font-weight="700">node2</text>
    <text x="714" y="180" class="sub" font-size="11.5">worker  ·  NFVI / CNF</text>
    <line x1="714" y1="190" x2="952" y2="190" stroke="#EDF1F5" stroke-width="1.2"/>
    <text x="714" y="212" class="ink mono" font-size="14" font-weight="600">10.10.10.12</text>
    <text x="714" y="231" class="sub" font-size="11.5">2 vCPU · 4 GB RAM</text>
    <text x="714" y="250" class="ink" font-size="11">k3s agent · CNF pod</text>
    <rect x="712" y="268" width="118" height="30" rx="6" fill="#EEF3F8" stroke="#CBDDEA" stroke-width="1.1"/>
    <circle cx="726" cy="283" r="4.2" fill="#4F7CAC"/>
    <text x="737" y="287" class="ink" font-size="10.5" font-weight="600">eth1 → MGMT</text>
    <rect x="836" y="268" width="118" height="30" rx="6" fill="#FAF1E6" stroke="#EAD6BC" stroke-width="1.1"/>
    <circle cx="850" cy="283" r="4.2" fill="#C0873E"/>
    <text x="861" y="287" class="ink" font-size="10.5" font-weight="600">eth2 → DATA</text>
  </g>

  <g stroke-width="2" fill="none">
    <line x1="145" y1="324" x2="145" y2="410" stroke="#4F7CAC"/>
    <line x1="207" y1="324" x2="207" y2="486" stroke="#5E8C6A" stroke-dasharray="4 4"/>
    <line x1="269" y1="324" x2="269" y2="562" stroke="#C0873E"/>
    <line x1="458" y1="324" x2="458" y2="410" stroke="#4F7CAC"/>
    <line x1="520" y1="324" x2="520" y2="486" stroke="#5E8C6A" stroke-dasharray="4 4"/>
    <line x1="582" y1="324" x2="582" y2="562" stroke="#C0873E"/>
    <line x1="771" y1="324" x2="771" y2="410" stroke="#4F7CAC"/>
    <line x1="833" y1="324" x2="833" y2="486" stroke="#5E8C6A" stroke-dasharray="4 4"/>
    <line x1="895" y1="324" x2="895" y2="562" stroke="#C0873E"/>
  </g>

  <!-- Rail 1 MGMT -->
  <line x1="130" y1="410" x2="910" y2="410" stroke="#4F7CAC" stroke-width="3" class="rail"/>
  <g fill="#4F7CAC" stroke="#FFFFFF" stroke-width="2">
    <circle cx="145" cy="410" r="5.5"/><circle cx="458" cy="410" r="5.5"/><circle cx="771" cy="410" r="5.5"/>
  </g>
  <rect x="126" y="383" width="252" height="20" fill="#FFFFFF"/>
  <text x="130" y="398" class="ink" font-size="13" font-weight="700">① MGMT plane <tspan class="sub mono" font-weight="400" font-size="12">10.10.10.0/24</tspan></text>
  <rect x="676" y="383" width="238" height="20" fill="#FFFFFF"/>
  <text x="910" y="398" text-anchor="end" class="sub" font-size="11">VirtualBox intnet (mgmt-net) · eth1</text>

  <!-- Rail 2 K8s overlay -->
  <line x1="130" y1="486" x2="910" y2="486" stroke="#5E8C6A" stroke-width="3" stroke-dasharray="7 5" class="rail"/>
  <g fill="#5E8C6A" stroke="#FFFFFF" stroke-width="2">
    <circle cx="207" cy="486" r="5.5"/><circle cx="520" cy="486" r="5.5"/><circle cx="833" cy="486" r="5.5"/>
  </g>
  <rect x="126" y="459" width="240" height="20" fill="#FFFFFF"/>
  <text x="130" y="474" class="ink" font-size="13" font-weight="700">② K8s overlay <tspan class="sub mono" font-weight="400" font-size="12">10.42.0.0/16</tspan></text>
  <rect x="668" y="459" width="246" height="20" fill="#FFFFFF"/>
  <text x="910" y="474" text-anchor="end" class="sub" font-size="11">Flannel VXLAN (flannel.1) · pod-to-pod</text>

  <!-- Rail 3 Data plane -->
  <line x1="130" y1="562" x2="910" y2="562" stroke="#C0873E" stroke-width="3" class="rail"/>
  <g fill="#C0873E" stroke="#FFFFFF" stroke-width="2">
    <circle cx="269" cy="562" r="5.5"/><circle cx="582" cy="562" r="5.5"/><circle cx="895" cy="562" r="5.5"/>
  </g>
  <rect x="126" y="535" width="296" height="20" fill="#FFFFFF"/>
  <text x="130" y="550" class="ink" font-size="13" font-weight="700">③ Data plane <tspan class="sub mono" font-weight="400" font-size="12">10.30.0.0/24 · VLAN 30</tspan></text>
  <rect x="600" y="535" width="314" height="20" fill="#FFFFFF"/>
  <text x="910" y="550" text-anchor="end" class="sub" font-size="11">Multus + macvlan → net1 · Whereabouts .100–.200</text>

  <text x="520" y="620" text-anchor="middle" class="sub" font-size="11.5" font-style="italic">Ba lớp mạng tách biệt hoàn toàn — không định tuyến chéo giữa MGMT và Data plane.</text>
</svg>
